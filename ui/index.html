<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puppeteer Debugger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="header-left">
          <h1>Puppeteer Debugger</h1>
          <div class="pages-controls">
            <button id="refreshBtn" class="btn btn-sm btn-secondary" title="刷新页面列表">⟳</button>
            <button id="newPageBtn" class="btn btn-sm btn-success" title="新建页面">➕</button>
          </div>
        </div>
        <div class="connection-panel">
          <label for="chromePort">Chrome端口:</label>
          <input type="number" id="chromePort" value="9555" min="1024" max="65535">
          <button id="connectBtn" class="btn btn-primary">连接</button>
          <span id="status" class="status">未连接</span>
        </div>
      </div>

      <!-- 页面管理区域 -->
      <section class="pages-section">
        <div id="pagesList" class="pages-list">
          <p class="no-pages">未连接到Chrome实例</p>
        </div>
      </section>
    </header>

    <main class="main-grid">
      <!-- 代码执行 -->
      <section class="code-section">
        <div class="section-header">
          <h2>代码执行</h2>
          <button id="runBtn" class="btn btn-primary" disabled>执行</button>
        </div>
        <textarea id="codeInput" placeholder="输入JavaScript代码...&#10;&#10;// 浏览器代码: console.log('Hello World'); window.location.href = 'https://www.baidu.com'&#10;// Puppeteer代码: await page.goto('https://www.baidu.com', { waitUntil: 'domcontentloaded' })&#10;&#10;// Ctrl+Enter 快速执行"></textarea>
      </section>

      <!-- 执行结果 -->
      <section class="results-section">
        <div class="section-header">
          <h2>执行结果</h2>
        </div>
        <div id="result" class="result-area">
          <p class="placeholder">执行结果将显示在这里</p>
        </div>
      </section>

      <!-- 控制台输出 -->
      <section class="console-section">
        <div class="section-header">
          <h2>控制台输出</h2>
          <button id="clearConsoleBtn" class="btn btn-sm btn-secondary">清空</button>
        </div>
        <div id="console" class="console-area">
          <p class="placeholder">控制台消息将显示在这里</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Frontend configuration
    window.CONFIG = {
      server: {
        port: 9000,
        host: 'localhost'
      },
      chrome: {
        defaultPort: 9555
      }
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
